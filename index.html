<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<title>Self Checkout Kassa</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.header{
background:#111827;
padding:20px;
font-size:28px;
text-align:center;
}

.container{
display:flex;
}

.categories{
width:25%;
background:#1f2937;
padding:10px;
}

.cat{
background:#374151;
margin:10px;
padding:20px;
font-size:20px;
border-radius:10px;
cursor:pointer;
text-align:center;
}

.products{
width:45%;
padding:20px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:15px;
}

.product{
background:#2563eb;
padding:25px;
border-radius:10px;
font-size:20px;
text-align:center;
cursor:pointer;
}

.cart{
width:30%;
background:#111827;
padding:20px;
}

.total{
font-size:30px;
margin-top:20px;
}

button{
width:100%;
padding:15px;
font-size:20px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
}

.pay{
background:#16a34a;
}

.reset{
background:#ef4444;
}
</style>
</head>

<body>

<div class="header">
SELF CHECKOUT КАССА
</div>

<div class="container">

<div class="categories">
<div class="cat" onclick="showCat('bread')">Нан</div>
<div class="cat" onclick="showCat('drink')">Суусундук</div>
<div class="cat" onclick="showCat('sweet')">Таттуу</div>
</div>

<div class="products" id="products"></div>

<div class="cart">
<h3>Корзина</h3>
<div id="cart"></div>

<div class="total">
Жалпы: <span id="sum">0</span> сом
</div>

<button class="pay" onclick="pay()">ТӨЛӨӨ</button>
<button class="reset" onclick="resetCart()">ЖАҢЫ</button>
</div>

</div>

<script>

let total = 0
let cart = []

const products = {

bread:[
{name:"Нан",price:25},
{name:"Батон",price:35}
],

drink:[
{name:"Суу",price:40},
{name:"Кола",price:60}
],

sweet:[
{name:"Шоколад",price:120},
{name:"Чипсы",price:80}
]

}

function showCat(cat){

let html=""

products[cat].forEach(p=>{
html+=`
<div class="product" onclick="add('${p.name}',${p.price})">
${p.name}<br>${p.price} сом
</div>
`
})

document.getElementById("products").innerHTML=html
}

function add(name,price){

cart.push({name,price})

total+=price

updateCart()

}

function updateCart(){

let html=""

cart.forEach(i=>{
html+=i.name+" - "+i.price+" сом<br>"
})

document.getElementById("cart").innerHTML=html
document.getElementById("sum").innerText=total

}

function pay(){

alert("Төлөндү: "+total+" сом")

window.print()

resetCart()

}

function resetCart(){

cart=[]
total=0

updateCart()

}

</script>

</body>
</html>
