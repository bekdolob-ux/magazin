<!DOCTYPE html><html lang="ky">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚡ Электрик</title><style>
body{margin:0;font-family:Arial;background:#0b0f19;color:white}
header{text-align:center;padding:15px;font-size:20px}
.container{padding:15px}
.card{background:#121826;border-radius:15px;padding:15px;margin-bottom:20px}
.card img{width:100%;border-radius:10px}
.title{font-size:20px}
.city{color:#9ca3af}
.work{margin:5px 0}
.whatsapp{background:#22c55e;padding:10px;border-radius:10px;color:black;text-decoration:none;display:inline-block;margin-top:10px}
</style></head><body><header>⚡ Электрик кызматтары</header>
<div class="container" id="list"></div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "СЕНИН_KEY",
  authDomain: "СЕНИН",
  databaseURL: "СЕНИН",
  projectId: "СЕНИН"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const list = document.getElementById("list");

onValue(ref(db, "masters"), (snapshot) => {
  list.innerHTML = "";
  snapshot.forEach(child => {
    let m = child.val();

    list.innerHTML += `
    <div class="card">
      <img src="${m.img}">
      <div class="title">${m.name}</div>
      <div class="city">📍 ${m.city}</div>
      <div class="work">🛠 ${m.work}</div>
      <a class="whatsapp" href="https://wa.me/${m.phone}">WhatsApp</a>
    </div>`;
  });
});
</script></body>
</html>
