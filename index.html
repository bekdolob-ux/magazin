<!DOCTYPE html>
<html lang="ky">
<head>
<meta charset="UTF-8">
<title>Self Service Kassa</title>

<style>
body{
font-family: Arial;
background:#111;
color:white;
text-align:center;
}

h1{
margin:20px;
}

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
padding:20px;
}

button{
font-size:25px;
padding:30px;
border:none;
border-radius:15px;
background:#2ecc71;
color:white;
}

button:active{
background:#27ae60;
}

.total{
font-size:40px;
margin:20px;
}

.pay{
background:#e74c3c;
font-size:35px;
padding:25px;
}

.reset{
background:#3498db;
font-size:25px;
padding:20px;
}
</style>
</head>

<body>

<h1>ӨЗҮН ӨЗҮ ТЕЙЛӨӨ КАССА</h1>

<div class="products">

<button onclick="add(25)">Нан<br>25 сом</button>
<button onclick="add(40)">Суу<br>40 сом</button>
<button onclick="add(120)">Шоколад<br>120 сом</button>

<button onclick="add(60)">Кола<br>60 сом</button>
<button onclick="add(80)">Чипсы<br>80 сом</button>
<button onclick="add(150)">Май<br>150 сом</button>

</div>

<div class="total">
Жалпы: <span id="sum">0</span> сом
</div>

<button class="pay" onclick="pay()">ТӨЛӨӨ</button>
<br><br>
<button class="reset" onclick="reset()">ЖАҢЫ ЗАКАЗ</button>

<script>

let total = 0

function add(price){
total += price
document.getElementById("sum").innerText = total
}

function pay(){
alert("Төлөө суммасы: " + total + " сом")
}

function reset(){
total = 0
document.getElementById("sum").innerText = total
}

</script>

</body>
</html>
