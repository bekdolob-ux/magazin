<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smart Store Assistant</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
text-align:center;
}

h1{
font-size:40px;
}

#search{
font-size:20px;
padding:10px;
width:300px;
margin:20px;
}

.product{
display:inline-block;
background:#222;
padding:20px;
margin:15px;
border-radius:10px;
width:200px;
}

img{
width:120px;
height:120px;
}

button{
font-size:18px;
padding:10px;
margin-top:10px;
width:150px;
}

#cart{
margin-top:30px;
font-size:22px;
}

</style>
</head>

<body>

<h1>Ассистент магазина</h1>

<input id="search" placeholder="Поиск товара">

<div id="products"></div>

<h2>Корзина</h2>

<div id="cart"></div>

<h2 id="total">Итого: 0 сом</h2>

<button onclick="pay()">Оплатить</button>
<button onclick="clearCart()">Очистить</button>

<script>

let products = [

{
name:"Coca Cola",
price:85,
image:"https://upload.wikimedia.org/wikipedia/commons/1/1b/Coca-Cola_bottle.jpg"
},

{
name:"Snickers",
price:60,
image:"https://upload.wikimedia.org/wikipedia/commons/9/92/Snickers_bars.jpg"
},

{
name:"Green Tea",
price:120,
image:"https://upload.wikimedia.org/wikipedia/commons/0/04/Tea.jpg"
},

{
name:"Pepsi",
price:80,
image:"https://upload.wikimedia.org/wikipedia/commons/6/68/Pepsi_can.jpg"
}

]

let total = 0

function speak(text){

let speech = new SpeechSynthesisUtterance(text)

speech.lang = "ru-RU"

speechSynthesis.speak(speech)

}

function render(){

let html=""

products.forEach(p=>{

html += `

<div class="product">

<img src="${p.image}"><br>

<b>${p.name}</b><br>

${p.price} сом<br>

<button onclick="add('${p.name}',${p.price})">Добавить</button>

</div>

`

})

document.getElementById("products").innerHTML = html

}

render()

function add(name,price){

total += price

document.getElementById("cart").innerHTML += name+" - "+price+" сом<br>"

document.getElementById("total").innerText="Итого: "+total+" сом"

speak("Товар добавлен в корзину")

}

function pay(){

speak("Спасибо за покупку")

alert("Спасибо за покупку")

print()

total = 0

document.getElementById("cart").innerHTML=""

document.getElementById("total").innerText="Итого: 0 сом"

}

function clearCart(){

total=0

document.getElementById("cart").innerHTML=""

document.getElementById("total").innerText="Итого: 0 сом"

speak("Корзина очищена")

}

</script>

</body>
</html>
